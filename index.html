<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Janani Balasubramanian | HR Leader</title>

<link rel="icon" href="janani_profile.jpg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f9f9f9;
}

/* HERO */
header {
    display:flex;
    gap:20px;
    padding:30px;
    align-items:center;
}

header img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    object-position: top center;
}

/* TYPING */
#typing {
    font-size:18px;
    color:#94c11f;
    height:24px;
}

/* BUTTONS */
.btn {
    padding:10px 16px;
    background:#94c11f;
    color:white;
    border:none;
    margin:5px;
    cursor:pointer;
}

/* TESTIMONIAL */
.testimonial {
    margin:20px;
    padding:20px;
    background:white;
    border-radius:10px;
    display:none;
}

/* FLOAT BUTTON */
.float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="janani_profile.jpg">

<div>
<h1>Janani Balasubramanian</h1>
<div id="typing"></div>

<p>📍 Chennai | 📧 beingjanani@gmail.com</p>

<button class="btn" onclick="window.open('mailto:beingjanani@gmail.com')">Email</button>
<button class="btn" onclick="window.open('https://wa.me/91XXXXXXXXXX')">WhatsApp</button>

</div>
</header>

<!-- TESTIMONIALS -->
<div class="testimonial">"Exceptional HR leader who drives real impact."</div>
<div class="testimonial">"Strong business partner and people champion."</div>
<div class="testimonial">"Delivered hiring at scale with quality."</div>

<!-- FLOAT -->
<div class="float" onclick="window.open('https://wa.me/919790956509')">
<i class="fab fa-whatsapp"></i>
</div>

<script>
/* TYPING */
const texts = [
"Driving People Strategy",
"Building High-Impact Teams",
"Enabling Business Growth"
];

let i=0,j=0,current="",isDeleting=false;

function type(){
    current = texts[i];
    document.getElementById("typing").innerText = current.substring(0,j);

    if(!isDeleting && j<current.length) j++;
    else if(isDeleting && j>0) j--;
    else{
        isDeleting=!isDeleting;
        if(!isDeleting) i=(i+1)%texts.length;
    }
    setTimeout(type,100);
}
type();

/* TESTIMONIAL ROTATE */
let t=0;
const testimonials=document.querySelectorAll(".testimonial");

function showTestimonial(){
    testimonials.forEach(el=>el.style.display="none");
    testimonials[t].style.display="block";
    t=(t+1)%testimonials.length;
}
setInterval(showTestimonial,3000);
showTestimonial();
</script>

</body>
</html>
