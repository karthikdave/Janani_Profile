<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Janani Balasubramanian | HR Leader</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(to bottom, #f5f7f6, #eef2ec);
    color: #222;
    scroll-behavior: smooth;
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    z-index: 1000;
}

nav a {
    text-decoration: none;
    font-weight: 600;
    color: #222;
    padding-bottom: 5px;
}

nav a.active {
    color: #bfa046;
    border-bottom: 2px solid #bfa046;
}

/* HERO */
header {
    display: flex;
    align-items: center;
    gap: 30px;
    margin: 30px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* PHOTO */
.photo-frame {
    width: 140px;
    height: 140px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #bfa046;
}

.photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
}

/* CTA */
.cta a {
    text-decoration: none;
    padding: 10px 18px;
    margin-right: 10px;
    border-radius: 8px;
    font-weight: 600;
}

.view-btn {
    background: #bfa046;
    color: white;
}

.download-btn {
    border: 2px solid #bfa046;
    color: #bfa046;
}

/* SECTIONS */
section {
    padding: 30px;
    margin: 20px;
    background: white;
    border-radius: 14px;
}

/* MOBILE */
@media(max-width:600px){
    header {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<nav>
<a href="#summary">Summary</a>
<a href="#experience">Experience</a>
<a href="#skills">Expertise</a>
<a href="#education">Education</a>
</nav>

<header>
<div class="photo-frame">
<img src="janani_profile.jpg">
</div>

<div>
<h1>Janani Balasubramanian</h1>
<p>HR Leader | Strategic People Partner</p>

<div class="cta">
<a href="janani_resume.pdf" target="_blank" class="view-btn">View Resume</a>
<a href="janani_resume.pdf" download class="download-btn">Download Resume</a>
</div>

</div>
</header>

<section id="summary">
<h2>Summary</h2>
<p>HR Leader...</p>
</section>

<section id="experience">
<h2>Experience</h2>
<p>Ola | Salcomp | Nokia</p>
</section>

<section id="skills">
<h2>Expertise</h2>
<p>HRBP | Talent | Workforce</p>
</section>

<section id="education">
<h2>Education</h2>
<p>MSW | BSW</p>
</section>

<script>
const links = document.querySelectorAll("nav a");
const sections = document.querySelectorAll("section");

/* CLICK FIX (locks correct section) */
links.forEach(link => {
    link.addEventListener("click", function () {
        links.forEach(l => l.classList.remove("active"));
        this.classList.add("active");
    });
});

/* SCROLL FIX (accurate detection) */
window.addEventListener("scroll", () => {
    let current = "";

    sections.forEach(section => {
        const top = section.offsetTop - 120;
        const bottom = top + section.offsetHeight;

        if (window.scrollY >= top && window.scrollY < bottom) {
            current = section.id;
        }
    });

    links.forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + current) {
            link.classList.add("active");
        }
    });
});
</script>

</body>
</html>
